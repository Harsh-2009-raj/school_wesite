<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
}

.nav-links{
    display: flex;
    gap: 2rem;
    list-style: none;
}

.nav-links a{
    text-decoration: none;
    color: black;
}

.menu-btn{
    display: none;
    font-size: 2rem;
    cursor: pointer;
}

/* Mobile View */
@media (max-width: 768px){

    .nav-links{
        display: none;
    }

    .menu-btn{
        display: block;
    }
}
    </style>
</head>
<body>
    <nav>
    <div class="logo">Logo</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact Us</a></li>
    </ul>

    <div class="menu-btn">☰</div>
</nav>
</body>
</html>
